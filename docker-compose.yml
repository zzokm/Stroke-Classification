services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: stroke-api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8003
      API_RELOAD: "false"
      API_WORKERS: 1
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-https://stroke.zokm.me,http://stroke.zokm.me:6454}
    expose:
      - "8003"
    networks:
      - stroke-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: stroke-web
    restart: unless-stopped
    ports:
      - "6454:3003"
    environment:
      NEXT_PUBLIC_API_URL: /api
      INTERNAL_API_URL: http://api:8003
    depends_on:
      api:
        condition: service_healthy
    networks:
      - stroke-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  stroke-net:
    driver: bridge
